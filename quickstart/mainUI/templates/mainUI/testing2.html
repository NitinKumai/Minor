{% extends 'base.html' %} {% load static %} {% block content %}
<div id="editor"></div>

<script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@19.0.0",
            "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
            "slate": "https://esm.sh/slate",
            "slate-react": "https://esm.sh/slate-react?deps=react@19.0.0,react-dom@19.0.0",
            "@yoopta/editor": "https://esm.sh/@yoopta/editor",
            "@yoopta/paragraph": "https://esm.sh/@yoopta/paragraph",
            "@yoopta/marks": "https://esm.sh/@yoopta/marks"
        }
    }
</script>
<script type="module">
    import React, { useState } from "react";
    import { createRoot } from "react-dom/client";
    import { createEditor } from "slate";
    import { Slate, Editable, withReact } from "slate-react";

    import YooptaEditor, { createYooptaEditor } from "@yoopta/editor";
    import Paragraph from "@yoopta/paragraph";
    import { Bold, Italic, Underline } from "@yoopta/marks";

    const initialValue = [
        {
            type: "paragraph",
            children: [{ text: "A line of text in a paragraph." }],
        },
    ];

    const App = () => {
        const [editor] = useState(() => withReact(createEditor()));
        return React.createElement(
            Slate,
            { editor, initialValue },
            React.createElement(Editable, {
                onKeyDown: (event) => {
                    if (event.key === "&") {
                        event.preventDefault();
                        editor.insertText("and");
                    }
                },
            }),
        );
    };

    createRoot(document.getElementById("editor")).render(
        React.createElement(App),
    );
</script>
{% endblock %}
