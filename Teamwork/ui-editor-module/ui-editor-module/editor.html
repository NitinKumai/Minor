<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">

<script defer
src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

<script defer
src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

<title>Document Editor</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="topbar">

Language Independent Document Editor
<div class="doc-header">

<input class="doc-title" value="Untitled Document">

<div class="doc-info">

Saved locally

</div>

</div>
</div>



<div class="toolbar">
    <select id="translate-lang">

<option value="">Translate</option>

<option value="fr">French</option>

<option value="ja">Japanese</option>

<option value="hi">Hindi</option>

<option value="es">Spanish</option>

<option value="de">German</option>

</select>

<button onclick="translateText()">Convert</button>
    <select onchange="changeLanguage(this.value)">

<option value="en">English</option>
<option value="fr">French</option>
<option value="ja">Japanese</option>
<option value="hi">Hindi</option>
<option value="es">Spanish</option>
<option value="de">German</option>
<option value="zh">Chinese</option>
<option value="ar">Arabic</option>

</select>

<button onclick="format('bold')"><b>B</b></button>

<button onclick="format('italic')"><i>I</i></button>

<button onclick="format('underline')"><u>U</u></button>

<select onchange="format('formatBlock', this.value)">
<option value="">Heading</option>
<option value="h1">H1</option>
<option value="h2">H2</option>
<option value="h3">H3</option>
<option value="p">Paragraph</option>
</select>

<select>
<option>Markdown</option>
<option>LaTeX</option>
<option>Typst</option>
<option>HTML</option>
</select>
<button onclick="toggleSplit()">Split</button>

<button onclick="toggleDark()">Dark</button>

<button onclick="showAI()">AI Assist</button>

<button onclick="checkGrammar()">Grammar</button>

<span class="word-count">Words: 0</span>

<button class="export-btn">Export</button>

</div>





<div class="container">


<div class="sidebar">

<h3>Files</h3>

<div class="file">document1</div>

<div class="file">chapter1</div>

<div class="file">notes</div>
<h3>Outline</h3>

<div id="outline">

<p>No headings yet</p>

</div>

</div>



<div class="editor-area">
<div id="ai-panel" class="ai-panel">

<h3>AI Writing Assistant</h3>

<textarea id="ai-input" placeholder="Ask AI to improve text..."></textarea>

<button onclick="insertAI()">Insert</button>

</div>

<div class="editor" contenteditable="true">
    <div class="page-number">
Page 1
</div>

<h1>Start Writing...</h1>

<p>This editor supports multiple document formats.</p>

</div>



<div class="preview">
    <div class="preview">

<div class="preview-header">

Preview

</div>


<div class="preview-card" id="preview-content">

<p> live preview ...</p>

</div>

</div>
    <div class="preview" style="display:none"></div>

<h3>Preview</h3>

<p>Rendered output will appear here.</p>

</div>


</div>


</div>



<script src="script.js"></script>


</body>

</html>
